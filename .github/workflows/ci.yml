name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (test + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo test --workspace
        run: cargo test --workspace --locked

      # strata-html is frozen (sml-spec.md D19) and carries pre-existing
      # clippy warnings; every other crate must stay warning-free.
      - name: cargo clippy (workspace, excluding frozen strata-html)
        run: cargo clippy --workspace --exclude strata-html --all-targets -- -D warnings

      - name: cargo clippy (strata-html, no -D warnings)
        run: cargo clippy -p strata-html --all-targets

  ui:
    name: ui (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: pnpm lint
        run: pnpm lint

      - name: pnpm build
        run: pnpm build
