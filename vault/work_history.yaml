type: work_history
name: "黒田 太郎"
title: "ソフトウェアアーキテクト / バックエンドエンジニア"

summary: "大学卒業後、SIerでのシステム開発からキャリアをスタートし、Webベンチャー、スタートアップ、そしてフリーランスへとステップアップしてきました。一貫してバックエンド領域に軸足を置き、近年は大規模な [Rust](term:Rust) や [Go](term:Go) によるAPI/マイクロサービスの設計開発、クラウド移行、CI/CD環境の最適化に携わっています。複雑なデータ構造をクリーンに保つ設計思想を大切にしています。"

